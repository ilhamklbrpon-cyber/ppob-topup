<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin X - Produk Panel</title>
    <!-- Bootstrap 5 dark theme + icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Font Inter (modern clean font) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #0b0f1a 0%, #141b2b 100%);
            font-family: 'Inter', sans-serif;
            color: #eef2fb;
            min-height: 100vh;
        }
        /* glassmorphism navbar */
        .navbar-blur {
            background: rgba(18, 25, 40, 0.8);
            backdrop-filter: blur(14px) saturate(180%);
            -webkit-backdrop-filter: blur(14px) saturate(180%);
            border-bottom: 1px solid rgba(72, 120, 255, 0.15);
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            padding: 0.75rem 1.5rem;
        }
        .navbar-brand {
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #a6c9ff, #4f9eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.7rem;
        }
        .navbar-brand i {
            color: #3d8cff;
            background: rgba(61, 140, 255, 0.15);
            padding: 8px;
            border-radius: 16px;
            margin-right: 10px;
        }
        .btn-group-custom .btn {
            border-radius: 40px !important;
            padding: 0.5rem 1.3rem;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.2s ease;
        }
        .btn-group-custom .btn-primary.active {
            background: #2f6eff;
            border-color: #2f6eff;
            box-shadow: 0 4px 14px 0 #2f6eff66;
        }
        .btn-group-custom .btn-outline-primary {
            color: #cbd5ff;
            border-color: #2d4379;
            background: transparent;
        }
        .btn-group-custom .btn-outline-primary:hover {
            background: #1f2b4a;
            border-color: #4d7cff;
            color: white;
        }
        .btn-logout {
            background: rgba(255,70,70,0.1);
            border: 1px solid rgba(255,80,80,0.2);
            border-radius: 40px;
            padding: 0.5rem 1.2rem;
            color: #ffa7a7;
            transition: 0.2s;
            font-weight: 500;
        }
        .btn-logout:hover {
            background: rgba(255,70,70,0.25);
            border-color: #ff5e5e;
            color: #fff;
        }

        /* main card glass */
        .glass-card {
            background: rgba(20, 30, 50, 0.6);
            backdrop-filter: blur(12px) saturate(200%);
            -webkit-backdrop-filter: blur(12px) saturate(200%);
            border: 1px solid rgba(72, 120, 255, 0.2);
            border-radius: 32px;
            box-shadow: 0 30px 50px -20px rgba(0,0,0,0.8), inset 0 1px 2px rgba(255,255,255,0.06);
            overflow: hidden;
        }
        .glass-card .card-header-custom {
            background: rgba(15, 25, 45, 0.7);
            border-bottom: 1px solid rgba(80, 140, 255, 0.2);
            padding: 1.2rem 2rem;
        }
        .glass-card .card-header-custom h5 {
            font-weight: 600;
            letter-spacing: -0.01em;
            color: #e0ecff;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .glass-card .card-header-custom i {
            font-size: 1.6rem;
            color: #5292ff;
        }

        /* form styling */
        .form-label {
            font-weight: 500;
            color: #b0c8ff;
            letter-spacing: 0.02em;
            margin-bottom: 0.4rem;
        }
        .form-control, .form-control:focus {
            background: rgba(8, 18, 34, 0.7);
            border: 1.5px solid #253a60;
            border-radius: 20px;
            padding: 0.75rem 1.2rem;
            font-size: 1rem;
            color: #f0f6ff;
            backdrop-filter: blur(4px);
            box-shadow: none;
            transition: 0.2s;
        }
        .form-control:focus {
            border-color: #4d7cff;
            background: rgba(10, 22, 45, 0.9);
            box-shadow: 0 0 0 4px rgba(77, 124, 255, 0.2);
        }
        .form-control::placeholder {
            color: #5b6f9b;
            font-weight: 400;
            opacity: 0.7;
        }
        textarea.form-control {
            border-radius: 24px;
        }
        .btn-submit-glow {
            background: linear-gradient(95deg, #224cbe, #3475ff);
            border: none;
            border-radius: 60px;
            padding: 1rem;
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
            color: white;
            box-shadow: 0 8px 25px #1f4ecc80;
            transition: all 0.25s ease;
            border: 1px solid #6e9aff;
        }
        .btn-submit-glow:hover {
            background: linear-gradient(95deg, #2b5ad0, #4882ff);
            box-shadow: 0 12px 35px #2563eb;
            transform: scale(1.02);
            color: white;
        }

        /* produk list container */
        .produk-list {
            max-height: 540px;
            overflow-y: auto;
            padding: 0.2rem;
        }
        .produk-list::-webkit-scrollbar {
            width: 8px;
        }
        .produk-list::-webkit-scrollbar-track {
            background: #1a2645;
            border-radius: 20px;
        }
        .produk-list::-webkit-scrollbar-thumb {
            background: #3f5690;
            border-radius: 20px;
            border: 2px solid #1e2b48;
        }

        /* list item modern */
        .produk-item {
            background: rgba(16, 26, 48, 0.6);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(95, 145, 255, 0.15);
            border-radius: 26px;
            margin: 0.7rem 0.9rem;
            padding: 1.2rem 1.5rem;
            transition: 0.2s;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
        }
        .produk-item:hover {
            background: rgba(28, 42, 75, 0.8);
            border-color: #4d7cff60;
            transform: translateY(-2px);
        }
        .produk-image {
            width: 64px;
            height: 64px;
            border-radius: 22px;
            object-fit: cover;
            border: 2px solid #3566cc;
            background: #0e1a2f;
            box-shadow: 0 8px 12px #00000055;
        }
        .produk-info h6 {
            font-weight: 700;
            font-size: 1.15rem;
            color: #e5edff;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }
        .produk-info .text-muted-custom {
            color: #96addb;
            font-weight: 400;
            font-size: 0.9rem;
        }
        .produk-actions .btn-icon {
            background: rgba(26, 42, 80, 0.9);
            border: 1px solid #365599;
            border-radius: 40px !important;
            color: #c1d4ff;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.15s;
            backdrop-filter: blur(4px);
        }
        .produk-actions .btn-icon:hover {
            background: #2f4b9b;
            border-color: #6c96ff;
            color: white;
            box-shadow: 0 4px 12px #1d3d9c;
        }
        .produk-actions .btn-icon-danger {
            border-color: #b3435e;
            background: rgba(150, 50, 70, 0.3);
            color: #ffb0b0;
        }
        .produk-actions .btn-icon-danger:hover {
            background: #ac385b;
            border-color: #ff7c7c;
            color: white;
        }

        .footer {
            color: #6f85b5;
            font-size: 0.9rem;
            padding: 2rem;
            text-align: center;
            border-top: 1px solid #1f3255;
            margin-top: 2.5rem;
        }

        #status {
            border-radius: 100px;
            padding: 0.8rem 1rem;
            font-weight: 600;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            transition: 0.2s;
        }
        #status.success {
            background: rgba(25, 135, 84, 0.25);
            color: #a1f0b5;
            border: 1px solid #19875490;
        }
        #status.error {
            background: rgba(220, 53, 69, 0.25);
            color: #ffbcbc;
            border: 1px solid #dc354580;
        }

        /* empty state */
        .empty-state {
            padding: 4rem 2rem;
            text-align: center;
            color: #859bce;
            font-size: 1.1rem;
        }
        .empty-state i {
            font-size: 4rem;
            color: #334e88;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <!-- modern navbar -->
    <nav class="navbar-blur navbar navbar-expand-lg sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="#">
                <i class="bi bi-grid-1x2-fill"></i> 
                <span>admin<span style="color:#9bbaff;">X</span></span>
            </a>
            <div class="d-flex align-items-center gap-3">
                <div class="btn-group btn-group-custom" role="group">
                    <a href="#" class="btn btn-primary active"><i class="bi bi-house-door-fill me-2"></i>Home</a>
                    <a href="/mutasi" class="btn btn-outline-primary"><i class="bi bi-bar-chart-steps me-2"></i>Mutasi</a>
                </div>
                <button class="btn btn-logout" onclick="logout()">
                    <i class="bi bi-box-arrow-right me-2"></i>Logout
                </button>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <!-- page header -->
        <div class="d-flex align-items-center gap-3 mb-5">
            <div class="p-3" style="background: #23315e; border-radius: 28px; box-shadow: 0 12px 18px #00000050;">
                <i class="bi bi-boxes fs-1" style="color:#89b4ff;"></i>
            </div>
            <div>
                <h1 class="display-6 fw-bold" style="letter-spacing: -0.03em; background: linear-gradient(120deg, #ffffff, #b2d0ff); -webkit-background-clip: text; background-clip: text; color: transparent;">Manajemen produk</h1>
                <p class="text-secondary-emphasis" style="color:#9ab2ea !important;">Kelola produk digital dengan antarmuka modern</p>
            </div>
        </div>

        <!-- card tambah produk (glass) -->
        <div class="glass-card mb-5">
            <div class="card-header-custom">
                <h5><i class="bi bi-plus-circle-dotted"></i> Tambah produk baru</h5>
            </div>
            <div class="card-body p-4 p-xl-5">
                <form id="formProduk" novalidate>
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label for="nama" class="form-label"><i class="bi bi-tag me-1"></i>Nama produk <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="nama" name="nama" placeholder="cth: Cloud Panel 10GB" required autocomplete="off">
                        </div>
                        <div class="col-md-6">
                            <label for="deks" class="form-label"><i class="bi bi-chat-left-text me-1"></i>Deskripsi singkat</label>
                            <input type="text" class="form-control" id="deks" name="deks" placeholder="SSD 10GB, 2 core" autocomplete="off">
                        </div>
                        <div class="col-12">
                            <label for="fulldesk" class="form-label"><i class="bi bi-file-text me-1"></i>Deskripsi lengkap</label>
                            <textarea class="form-control" id="fulldesk" name="fulldesk" placeholder="Fitur detail, harga, masa aktif ..." rows="3"></textarea>
                        </div>
                        <div class="col-md-6">
                            <label for="imageurl" class="form-label"><i class="bi bi-image me-1"></i>URL Gambar</label>
                            <input type="text" class="form-control" id="imageurl" name="imageurl" placeholder="https://.../image.jpg" autocomplete="off">
                        </div>
                        <div class="col-md-6">
                            <label for="linkorder" class="form-label"><i class="bi bi-whatsapp me-1"></i>Link Order (WA)</label>
                            <input type="text" class="form-control" id="linkorder" name="linkorder" placeholder="https://wa.me/62812..." autocomplete="off">
                        </div>
                        <div class="col-12 mt-4">
                            <button type="submit" class="btn btn-submit-glow w-100">
                                <i class="bi bi-cloud-arrow-up-fill me-2"></i> Tambahkan produk
                            </button>
                        </div>
                        <div class="col-12 text-center mt-4">
                            <div id="status" role="alert" aria-live="polite"></div>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- card daftar produk -->
        <div class="glass-card">
            <div class="card-header-custom">
                <h5><i class="bi bi-grid-3x3-gap-fill"></i> Koleksi produk</h5>
            </div>
            <div class="card-body p-0">
                <div id="produkContainer" class="produk-list list-group list-group-flush" style="background: transparent;"></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <span>© 2025 AdminX — secured by encrypted vibe</span>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // fungsi-fungsi original ditingkatkan dengan tampilan baru (logika tetap)
        async function tambahProduk() {
            const nama = document.getElementById("nama").value.trim();
            const deks = document.getElementById("deks").value.trim();
            const fulldesk = document.getElementById("fulldesk").value.trim();
            const imageurl = document.getElementById("imageurl").value.trim();
            const linkorder = document.getElementById("linkorder").value.trim();
            const statusBox = document.getElementById("status");
            statusBox.textContent = ''; statusBox.className = '';

            if (!nama) {
                statusBox.textContent = '⚠️ Nama produk wajib diisi.';
                statusBox.className = 'error';
                document.getElementById("nama").focus(); 
                return;
            }

            try {
                const res = await fetch('/produk', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    credentials: 'include', body: JSON.stringify({ nama, deks, fulldesk, imageurl, linkorder })
                });
                const result = await res.json();
                if (result.success) {
                    statusBox.textContent = '✓ Produk berhasil ditambahkan!';
                    statusBox.className = 'success';
                    document.getElementById("formProduk").reset();
                    document.getElementById("nama").focus();
                    loadProduk();
                } else {
                    statusBox.textContent = result.message || '✗ Gagal menambahkan produk.';
                    statusBox.className = 'error';
                }
            } catch (err) {
                statusBox.textContent = '✗ Koneksi gagal, periksa jaringan.';
                statusBox.className = 'error';
            }
        }

        async function loadProduk() {
            const container = document.getElementById("produkContainer");
            container.innerHTML = '<div class="empty-state"><i class="bi bi-arrow-repeat"></i><br>Memuat produk ...</div>';
            try {
                const res = await fetch('/produk');
                const result = await res.json();
                if (result.success && result.data.length > 0) {
                    container.innerHTML = '';
                    result.data.forEach(prod => {
                        const prodDiv = document.createElement('div');
                        prodDiv.className = 'produk-item d-flex flex-wrap align-items-center gap-3';
                        prodDiv.innerHTML = `
                            <img src="${prod.imageurl && prod.imageurl.trim() !== '' ? prod.imageurl : 'https://placehold.co/64x64/1e2a47/b0c8ff?text=📦'}" alt="img" class="produk-image">
                            <div class="produk-info flex-grow-1">
                                <h6 class="mb-0">${prod.nama}</h6>
                                <p class="mb-0 text-muted-custom small">${prod.deks && prod.deks.trim() !== '' ? prod.deks : '✨ tidak ada deskripsi'}</p>
                            </div>
                            <div class="produk-actions d-flex gap-2 ms-sm-auto mt-2 mt-sm-0">
                                ${prod.linkorder && prod.linkorder.trim() !== '' ? 
                                    `<button type="button" class="btn btn-icon" data-bs-toggle="tooltip" title="Salin link order" onclick="copyLink(this, '${prod.linkorder}')"><i class="bi bi-clipboard me-1"></i> salin</button>` 
                                    : ''}
                                <button type="button" class="btn btn-icon btn-icon-danger" onclick="hapusProduk('${prod._id}', '${prod.nama}')"><i class="bi bi-trash3 me-1"></i> hapus</button>
                            </div>`;
                        container.appendChild(prodDiv);
                    });
                    // init tooltips
                    const tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
                    tooltipTriggerList.map(el => new bootstrap.Tooltip(el));
                } else {
                    container.innerHTML = '<div class="empty-state"><i class="bi bi-inbox"></i><br>Belum ada produk. Tambahkan sekarang!</div>';
                }
            } catch (error) {
                container.innerHTML = '<div class="empty-state text-danger"><i class="bi bi-exclamation-triangle"></i><br>Gagal memuat produk.</div>';
            }
        }

        async function hapusProduk(id, nama) {
            if (!confirm(`Hapus produk "${nama}" ?`)) return;
            try {
                const res = await fetch(`/produk/${id}`, { method: 'DELETE', credentials: 'include' });
                const result = await res.json();
                if (result.success) {
                    loadProduk();
                } else {
                    alert('❌ Gagal hapus: ' + (result.message || 'unknown error'));
                }
            } catch {
                alert('❌ Koneksi error, coba lagi.');
            }
        }

        async function logout() {
            try {
                const res = await fetch('/logout', { method: 'GET', credentials: 'include' });
                const result = await res.json();
                if (result.success) window.location.href = '/login';
                else alert('Gagal logout');
            } catch {
                alert('Gagal logout');
            }
        }

        function copyLink(element, text) {
            navigator.clipboard.writeText(text).then(() => {
                const tooltip = bootstrap.Tooltip.getInstance(element);
                const originalTitle = element.getAttribute('data-bs-original-title') || 'Salin link order';
                element.setAttribute('data-bs-original-title', 'Tersalin!');
                if (tooltip) tooltip.show();
                setTimeout(() => {
                    element.setAttribute('data-bs-original-title', originalTitle);
                    if (tooltip) tooltip.hide();
                }, 1500);
            }).catch(() => alert('Gagal menyalin'));
        }

        document.getElementById('formProduk').addEventListener('submit', e => { e.preventDefault(); tambahProduk(); });
        window.addEventListener('load', () => { loadProduk(); document.getElementById("nama").focus(); });
    </script>
</body>
</html>
