<!DOCTYPE html>
<html lang="id" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembayaran Instan - kinzxxPedia</title>
    <!-- Bootstrap 5.3 dengan icon & font modern -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Font untuk sentuhan modern (opsional) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        :root {
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.2);
            --card-blur: 12px;
            --primary-gradient: linear-gradient(145deg, #0a5cff, #5f2eea);
        }
        [data-bs-theme="dark"] {
            --glass-bg: rgba(20, 25, 35, 0.8);
            --glass-border: rgba(75, 85, 110, 0.5);
            --glass-shadow: 0 20px 40px -10px rgba(0, 15, 40, 0.6);
            --primary-gradient: linear-gradient(145deg, #5f2eea, #b5179e);
        }
        body {
            background: rgb(var(--bs-body-bg-rgb));
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(2px);
        }
        #bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 30% 40%, rgba(var(--bs-primary-rgb), 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 70% 80%, rgba(var(--bs-primary-rgb), 0.1) 0%, transparent 45%);
            transition: background 0.3s;
        }
        /* Navbar transparan dengan glass effect */
        .navbar-blur {
            background: var(--glass-bg) !important;
            backdrop-filter: blur(var(--card-blur));
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 5px 20px -8px rgba(0,0,0,0.2);
        }
        /* Card utama dengan efek kaca dan border halus */
        .glass-payment-card {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--card-blur));
            border: 1px solid var(--glass-border);
            border-radius: 36px;
            box-shadow: var(--glass-shadow);
            transition: transform 0.25s ease, box-shadow 0.3s;
            max-width: 520px;
            margin: 0 auto;
        }
        .glass-payment-card:hover {
            box-shadow: 0 30px 55px -12px rgba(var(--bs-primary-rgb), 0.3);
        }
        /* QR container modern dengan cincin gradien */
        .qr-glow {
            position: relative;
            display: inline-block;
            margin: 12px 0 20px;
            cursor: pointer;
            border-radius: 32px;
            background: white;
            padding: 12px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.15);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.3, 1.2);
        }
        .qr-glow::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 38px;
            padding: 3px;
            background: var(--primary-gradient);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.6;
            transition: opacity 0.3s;
        }
        .qr-glow:hover {
            transform: scale(1.04) translateY(-4px);
            box-shadow: 0 25px 35px -8px rgba(0, 110, 255, 0.4);
        }
        .qr-glow:hover::before { opacity: 1; }
        .qr-image-main {
            width: 240px;
            height: 240px;
            border-radius: 24px;
            background-color: #fff;
            display: block;
        }
        /* detail list lebih modern */
        .detail-modern li {
            background: rgba(var(--bs-tertiary-bg-rgb), 0.5);
            margin: 8px 0;
            padding: 14px 20px;
            border-radius: 40px;
            border: 1px solid rgba(130, 140, 160, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 500;
            backdrop-filter: blur(4px);
            transition: 0.15s;
        }
        .detail-modern li:hover {
            border-color: rgba(var(--bs-primary-rgb), 0.3);
            background: rgba(var(--bs-tertiary-bg-rgb), 0.7);
        }
        .detail-modern li span:last-child {
            font-weight: 700;
            letter-spacing: -0.01em;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        /* countdown badge */
        .countdown-chip {
            background: rgba(var(--bs-primary-rgb), 0.12);
            padding: 6px 16px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--bs-primary);
            display: inline-block;
        }
        /* status box animasi */
        .status-fancy {
            border: none;
            border-radius: 50px;
            padding: 14px 22px;
            font-weight: 600;
            background: rgba(var(--bs-primary-rgb), 0.15);
            color: var(--bs-primary);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.3);
            backdrop-filter: blur(8px);
            transition: all 0.2s;
        }
        .spinner-modern {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(var(--bs-primary-rgb), 0.25);
            border-top: 3px solid var(--bs-primary);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin-right: 12px;
        }
        .theme-toggle-btn {
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bs-body-color);
            font-size: 1.4rem;
            box-shadow: 0 5px 12px rgba(0,0,0,0.05);
        }
        #error-view {
            max-width: 500px;
            margin: 30px auto;
            border-radius: 48px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,100,100,0.3);
        }
        /* modal qr modern */
        .modal-content-glossy {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
        }
        .modal-header-clean {
            border: none;
            padding: 1.5rem 1.5rem 0.5rem;
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <!-- Header dengan efek blur -->
    <header class="navbar navbar-expand-lg navbar-blur sticky-top py-2">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bolder fs-3" href="/">
                <i class="bi bi-lightning-charge-fill me-1" style="background: linear-gradient(145deg, #0a5cff, #b5179e); -webkit-background-clip: text; background-clip: text; color: transparent;"></i>
                <span style="background: linear-gradient(145deg, #1e2b5e, #6a11cb); -webkit-background-clip: text; background-clip: text; color: transparent;">kinzxxPedia</span>
            </a>
            <button id="theme-toggle" class="btn theme-toggle-btn p-0" aria-label="Toggle theme">
                <i class="bi bi-sun-fill theme-icon-light"></i>
                <i class="bi bi-moon-stars-fill theme-icon-dark"></i>
            </button>
        </div>
    </header>

    <main class="container d-flex align-items-center justify-content-center flex-grow-1 py-4 px-3 px-lg-5">
        <!-- Payment view -->
        <div id="payment-view" class="w-100">
            <div class="glass-payment-card p-4 p-lg-5 text-center">
                <!-- badge kecil -->
                <span class="badge bg-primary bg-opacity-25 text-primary-emphasis rounded-pill px-3 py-2 mb-3 fw-semibold"><i class="bi bi-shield-check me-1"></i> Pembayaran aman</span>
                <h2 class="fw-bold mb-2">Hampir selesai!</h2>
                <p class="text-body-secondary small">Scan kode QR melalui <span class="fw-semibold">e-wallet</span> atau <span class="fw-semibold">mobile banking</span></p>

                <!-- QR dengan efek glow & modal trigger -->
                <div class="qr-glow" id="qr-container" role="button" title="Klik untuk perbesar & unduh">
                    <img id="qr-image-main" src="" alt="QRIS pembayaran" class="qr-image-main">
                </div>

                <!-- Detail transaksi dengan list modern -->
                <ul class="detail-modern list-unstyled mt-4">
                    <li><span><i class="bi bi-cash-stack me-2 opacity-75"></i>Total</span> <span id="payment-amount" class="fs-5"></span></li>
                    <li><span><i class="bi bi-receipt me-2 opacity-75"></i>ID Deposit</span> <span id="payment-id" style="font-size:0.9rem;">#KZX224</span></li>
                    <li><span><i class="bi bi-hourglass-split me-2 opacity-75"></i>Kadaluarsa</span> 
                        <span class="countdown-chip" id="countdown">00:00</span>
                    </li>
                </ul>

                <!-- Status box dengan spinner atau icon -->
                <div id="status-box" class="status-fancy d-flex align-items-center justify-content-center mt-4">
                    <span class="spinner-modern"></span>
                    <span>Memeriksa pembayaran</span>
                </div>

                <!-- link kembali dengan desain lebih clean -->
                <div class="mt-5 small">
                    <a href="/" class="text-decoration-none text-secondary"><i class="bi bi-arrow-left me-1"></i> Batalkan & kembali ke beranda</a>
                </div>
            </div>
        </div>

        <!-- Error view (modern alert) -->
        <div id="error-view" class="p-5 text-center d-none" role="alert">
            <div class="display-1 text-danger-emphasis mb-3"><i class="bi bi-x-octagon-fill"></i></div>
            <h3 class="fw-bold">Oops, terjadi kesalahan</h3>
            <p id="error-message-text" class="text-body-secondary px-3">Sesi transaksi tidak ditemukan</p>
            <hr class="opacity-25 w-50 mx-auto">
            <a href="/" class="btn btn-outline-primary rounded-pill px-5 mt-2"><i class="bi bi-house-door me-2"></i>Ke Beranda</a>
        </div>
    </main>

    <!-- Modal QR dengan gaya glossy -->
    <div class="modal fade" id="qrModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content modal-content-glossy">
                <div class="modal-header modal-header-clean">
                    <h5 class="modal-title fw-bold"><i class="bi bi-qr-code-scan me-2"></i>QR Pembayaran</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center py-3">
                    <div class="p-3 bg-white rounded-4 d-inline-block shadow-sm">
                        <img id="qr-image-modal" src="" alt="QR besar" style="max-width:220px; border-radius: 16px;">
                    </div>
                </div>
                <div class="modal-footer justify-content-center border-0 pb-4">
                    <button type="button" class="btn btn-outline-secondary rounded-pill px-4" data-bs-dismiss="modal"><i class="bi bi-x-lg me-2"></i>Tutup</button>
                    <button type="button" class="btn btn-primary rounded-pill px-4" id="downloadQrBtn"><i class="bi bi-download me-2"></i>Unduh</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
    (function() {
        // Theme handling (sama dengan sebelumnya, tapi lebih ramping)
        const theme = {
            init() {
                this.btn = document.getElementById('theme-toggle');
                const saved = localStorage.getItem('theme') || 'light';
                this.apply(saved);
                this.btn.addEventListener('click', () => this.toggle());
            },
            apply(theme) {
                document.documentElement.setAttribute('data-bs-theme', theme);
                localStorage.setItem('theme', theme);
                document.getElementById('bg-canvas')?.dispatchEvent(new Event('themeChange'));
            },
            toggle() {
                const current = document.documentElement.getAttribute('data-bs-theme');
                this.apply(current === 'light' ? 'dark' : 'light');
            }
        };

        // Canvas background partikel (simplified, namun tetap estetik)
        const canvasAnim = {
            init() {
                this.canvas = document.getElementById('bg-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.particles = [];
                this.maxDist = 130;
                this.initParticles();
                window.addEventListener('resize', () => this.resize());
                this.canvas.addEventListener('themeChange', () => this.draw());
                this.resize();
                this.animate();
            },
            initParticles() {
                this.particles = [];
                for (let i = 0; i < (window.innerWidth < 700 ? 30 : 70); i++) {
                    this.particles.push({
                        x: Math.random(), y: Math.random(),
                        vx: (Math.random() - 0.5) * 0.002,
                        vy: (Math.random() - 0.5) * 0.002,
                        r: Math.random() * 2 + 1.2
                    });
                }
            },
            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                this.initParticles();
            },
            draw() {
                const ctx = this.ctx;
                ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                const particleColor = getComputedStyle(document.documentElement).getPropertyValue('--bs-border-color').trim() || '#aaa';
                ctx.fillStyle = particleColor;
                ctx.strokeStyle = particleColor;
                
                const w = this.canvas.width, h = this.canvas.height;
                // update posisi
                this.particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < 0) { p.x = 1; } else if (p.x > 1) { p.x = 0; }
                    if (p.y < 0) { p.y = 1; } else if (p.y > 1) { p.y = 0; }
                });

                // gambar partikel
                this.particles.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x * w, p.y * h, p.r, 0, Math.PI * 2);
                    ctx.fill();
                });

                // garis antar partikel
                for (let i = 0; i < this.particles.length; i++) {
                    for (let j = i+1; j < this.particles.length; j++) {
                        const p1 = this.particles[i], p2 = this.particles[j];
                        const dx = (p1.x - p2.x) * w, dy = (p1.y - p2.y) * h;
                        const dist = Math.hypot(dx, dy);
                        if (dist < this.maxDist) {
                            ctx.globalAlpha = 1 - dist / this.maxDist;
                            ctx.beginPath();
                            ctx.moveTo(p1.x * w, p1.y * h);
                            ctx.lineTo(p2.x * w, p2.y * h);
                            ctx.stroke();
                        }
                    }
                }
                ctx.globalAlpha = 1;
            },
            animate() {
                this.draw();
                requestAnimationFrame(() => this.animate());
            }
        };

        // Main logic transaksi
        document.addEventListener('DOMContentLoaded', () => {
            theme.init();
            canvasAnim.init();

            const transactionStr = sessionStorage.getItem('pendingTransaction');
            const paymentView = document.getElementById('payment-view');
            const errorView = document.getElementById('error-view');
            const errorMsg = document.getElementById('error-message-text');

            if (!transactionStr) {
                paymentView.style.display = 'none';
                errorView.classList.remove('d-none');
                errorMsg.textContent = 'Tidak ada transaksi pending. Silakan mulai dari halaman utama.';
                return;
            }

            let transactionData;
            try {
                transactionData = JSON.parse(transactionStr);
            } catch (e) {
                paymentView.style.display = 'none';
                errorView.classList.remove('d-none');
                errorMsg.textContent = 'Data transaksi rusak. Silakan ulangi.';
                return;
            }

            const { internalTrxId, paymentDetails } = transactionData;
            if (!paymentDetails || !paymentDetails.qr_image) {
                paymentView.style.display = 'none';
                errorView.classList.remove('d-none');
                errorMsg.textContent = 'Detail pembayaran tidak lengkap.';
                return;
            }

            // Set elemen dasar
            document.getElementById('qr-image-main').src = paymentDetails.qr_image;
            document.getElementById('qr-image-modal').src = paymentDetails.qr_image;
            document.getElementById('payment-amount').innerText = `Rp ${parseInt(paymentDetails.nominal || 0).toLocaleString('id-ID')}`;
            document.getElementById('payment-id').innerText = paymentDetails.id || 'N/A';

            // Countdown
            const countdownEl = document.getElementById('countdown');
            const expiryStr = paymentDetails.expired_at;
            let expiryTime = null;
            if (expiryStr) {
                expiryTime = new Date(expiryStr.replace(' ', 'T')).getTime();
            } else {
                expiryTime = Date.now() + 30 * 60 * 1000; // fallback 30 menit
            }

            const countdownInterval = setInterval(() => {
                const now = Date.now();
                const distance = expiryTime - now;
                if (distance <= 0) {
                    countdownEl.innerText = '00:00';
                    document.getElementById('status-box').innerHTML = '<i class="bi bi-clock-history me-2 fs-5"></i>Kadaluarsa';
                    document.getElementById('status-box').classList.add('bg-danger-subtle', 'text-danger');
                    clearInterval(countdownInterval);
                } else {
                    const mins = Math.floor(distance / 60000);
                    const secs = Math.floor((distance % 60000) / 1000);
                    countdownEl.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                }
            }, 500);

            // Modal & download
            const qrContainer = document.getElementById('qr-container');
            const qrModal = new bootstrap.Modal(document.getElementById('qrModal'));
            const downloadBtn = document.getElementById('downloadQrBtn');
            qrContainer.addEventListener('click', () => qrModal.show());
            downloadBtn.addEventListener('click', () => {
                const imgSrc = document.getElementById('qr-image-modal').src;
                const a = document.createElement('a');
                a.href = imgSrc;
                a.download = `QRIS-${paymentDetails.id || 'payment'}.png`;
                a.click();
            });

            // Status polling
            const statusBox = document.getElementById('status-box');
            let checkInterval;

            const updateStatus = async () => {
                try {
                    const res = await fetch(`/api/cek-status-deposit?trxId=${internalTrxId}`);
                    if (!res.ok) throw new Error('Network error');
                    const data = await res.json();
                    if (data.depositStatus === 'success') {
                        statusBox.innerHTML = '<i class="bi bi-check-circle-fill me-2 fs-5"></i>Pembayaran sukses! Mengalihkan...';
                        statusBox.classList.remove('status-fancy', 'bg-primary-subtle');
                        statusBox.classList.add('bg-success-subtle', 'text-success', 'border-0');
                        clearInterval(checkInterval);
                        sessionStorage.setItem('pendingOrder', JSON.stringify({ orderId: data.orderId }));
                        sessionStorage.removeItem('pendingTransaction');
                        setTimeout(() => window.location.href = '/status', 1500);
                    } else if (data.depositStatus === 'expired' || data.depositStatus === 'cancel') {
                        statusBox.innerHTML = `<i class="bi bi-exclamation-octagon me-2"></i>Pembayaran ${data.depositStatus}`;
                        statusBox.classList.add('bg-warning-subtle', 'text-warning-emphasis');
                        clearInterval(checkInterval);
                    } else {
                        // status pending / menunggu
                        statusBox.innerHTML = '<span class="spinner-modern me-2"></span>Menunggu pembayaran diverifikasi';
                        statusBox.classList.add('status-fancy');
                    }
                } catch (err) {
                    statusBox.innerHTML = '<i class="bi bi-wifi-off me-2"></i>Koneksi terputus, coba lagi...';
                    statusBox.classList.add('bg-secondary-subtle');
                }
            };

            checkInterval = setInterval(updateStatus, 5000);
            updateStatus(); // langsung sekali
        });
    })();
    </script>
</body>
</html>
